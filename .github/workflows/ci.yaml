name: CI

on:
  pull_request:
    branches: [main, master, dev]
  push:
    branches: [main, master, dev]

jobs:
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.14.6

      - name: Terraform fmt check
        run: terraform fmt -check -diff

      - name: Terraform init (validation only)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

  lint-scripts:
    name: Lint shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: ShellCheck
        run: |
          FAILED=0
          while IFS= read -r -d '' f; do
            if ! shellcheck --severity=warning "$f"; then
              FAILED=1
            fi
          done < <(find scripts -name '*.sh' -print0)
          exit $FAILED

  lint-workflows:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "." >> "$GITHUB_PATH"

      - name: Validate workflows with actionlint
        run: actionlint -color

      - name: YAML syntax check (composite actions)
        run: |
          FAILED=0
          for f in .github/actions/*/action.yml; do
            [ -f "$f" ] || continue
            if ! python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$f"; then
              echo "FAIL: $f"
              FAILED=1
            else
              echo "OK: $f"
            fi
          done
          exit $FAILED
