name: Test Alerts

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  send-test:
    name: Send test notifications to action group
    runs-on: ubuntu-latest
    env:
      VMSS_RATE_USD_B1S: ${{ vars.VMSS_RATE_USD_B1S }}
      LISTENER_RATE_USD_B2S: ${{ vars.LISTENER_RATE_USD_B2S }}
      ZAR_PER_USD: ${{ vars.ZAR_PER_USD }}
      VMSS_NAME: ${{ vars.RUNNER_VMSS_NAME || 'prod-runner-phoenixvc-vmss' }}
      ALERTS_AG: ${{ vars.RUNNER_ALERTS_ACTION_GROUP || 'prod-runner-alerts' }}
    steps:
      - name: Checkout (local composite actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get current capacity
        id: cap
        run: |
          RG="${{ vars.RUNNER_RESOURCE_GROUP_NAME }}"
          RAW=$(az vmss show -g "$RG" -n "$VMSS_NAME" --query "sku.capacity" -o tsv) || {
            echo "::error::Failed to query VMSS capacity (az exit code $?)"
            exit 1
          }
          if ! echo "$RAW" | grep -qE '^[0-9]+$'; then
            echo "::error::Unexpected VMSS capacity value: '$RAW'"
            exit 1
          fi
          echo "current=$RAW" >> "$GITHUB_OUTPUT"

      - name: Estimate cost at current
        id: cost_current
        uses: ./.github/actions/cost-guard
        with:
          capacity: ${{ steps.cap.outputs.current }}
          vmss_rate_usd_b1s: ${{ vars.VMSS_RATE_USD_B1S }}
          listener_rate_usd_b2s: ${{ vars.LISTENER_RATE_USD_B2S }}
          zar_per_usd: ${{ vars.ZAR_PER_USD }}
          monthly_budget_zar: ${{ vars.MONTHLY_BUDGET_ZAR }}
          hours: 720

      - name: Estimate cost at minimum
        id: cost_min
        uses: ./.github/actions/cost-guard
        with:
          capacity: 0
          vmss_rate_usd_b1s: ${{ vars.VMSS_RATE_USD_B1S }}
          listener_rate_usd_b2s: ${{ vars.LISTENER_RATE_USD_B2S }}
          zar_per_usd: ${{ vars.ZAR_PER_USD }}
          monthly_budget_zar: ${{ vars.MONTHLY_BUDGET_ZAR }}
          hours: 720

      - name: Print estimates
        run: |
          echo "Current capacity: ${{ steps.cap.outputs.current }}"
          echo "Estimated monthly cost — current: USD=${{ steps.cost_current.outputs.usd_estimate }} ZAR=${{ steps.cost_current.outputs.zar_estimate }}"
          echo "Estimated monthly cost — minimum: USD=${{ steps.cost_min.outputs.usd_estimate }} ZAR=${{ steps.cost_min.outputs.zar_estimate }}"

      - name: Show alert group receivers
        run: |
          RG="${{ vars.RUNNER_RESOURCE_GROUP_NAME }}"
          echo "Action group: $ALERTS_AG (resource group: $RG)"
          RECEIVERS=$(az monitor action-group show \
            --name "$ALERTS_AG" -g "$RG" \
            --query "emailReceivers[].{name:name,email:emailAddress,status:status}" \
            -o table 2>/dev/null) || true
          if [ -z "$RECEIVERS" ] || echo "$RECEIVERS" | grep -q "^$"; then
            echo "::warning::No email receivers configured on action group '$ALERTS_AG'. Add RUNNER_ALERT_EMAIL variable and run terraform apply."
          else
            echo "$RECEIVERS"
          fi

      - name: Trigger test notifications
        run: |
          az monitor action-group test-notifications create \
            --resource-group "${{ vars.RUNNER_RESOURCE_GROUP_NAME }}" \
            --action-group-name "$ALERTS_AG" \
            --alert-type metricstaticthreshold 2>/dev/null \
            || echo "::warning::test-notifications failed (no receivers configured?) — skipping"
