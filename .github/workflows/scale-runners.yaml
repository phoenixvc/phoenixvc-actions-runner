name: Scale Runners

on:
  workflow_dispatch:
    inputs:
      capacity:
        description: "Number of VMSS instances to scale to (capped by autoscale max, default 4)"
        required: true
        default: "1"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "4"
  schedule:
    # Every 30 min, auto-scale based on queued jobs and CPU
    - cron: "*/30 * * * *"

permissions:
  id-token: write
  contents: read

jobs:
  scale-up:
    name: Scale VMSS to ${{ github.event.inputs.capacity }} instances
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      VMSS_NAME: ${{ vars.RUNNER_VMSS_NAME || 'prod-runner-phoenixvc-vmss' }}
      AUTOSCALE_SETTING: ${{ vars.RUNNER_AUTOSCALE_SETTING_NAME || 'prod-runner-vmss-autoscale' }}
      ALERTS_AG: ${{ vars.RUNNER_ALERTS_ACTION_GROUP || 'prod-runner-alerts' }}

    steps:
      - name: Checkout (local composite actions)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get autoscale maximum
        id: cap
        uses: ./.github/actions/vmss-cap
        with:
          resource_group_name: ${{ vars.RUNNER_RESOURCE_GROUP_NAME }}
          autoscale_setting_name: ${{ env.AUTOSCALE_SETTING }}

      - name: Validate capacity cap
        run: |
          MAX="${{ steps.cap.outputs.max }}"
          REQ="${{ github.event.inputs.capacity }}"
          if [ -z "$MAX" ]; then
            echo "Unable to retrieve autoscale maximum"
            exit 1
          fi
          if [ "$REQ" -gt "$MAX" ]; then
            echo "Requested capacity $REQ exceeds maximum $MAX"
            exit 1
          fi

      - name: Budget check before scale-up
        id: budget
        uses: ./.github/actions/cost-guard
        with:
          capacity: ${{ github.event.inputs.capacity }}
          vmss_rate_usd_b1s: ${{ vars.VMSS_RATE_USD_B1S }}
          listener_rate_usd_b2s: ${{ vars.LISTENER_RATE_USD_B2S }}
          zar_per_usd: ${{ vars.ZAR_PER_USD }}
          monthly_budget_zar: ${{ vars.MONTHLY_BUDGET_ZAR }}
          hours: 720

      - name: Enforce budget
        run: |
          EX="${{ steps.budget.outputs.exceeded }}"
          if [ "$EX" = "1" ]; then
            echo "Budget threshold exceeded — aborting scale-up"
            az monitor action-group test-notifications create \
              --resource-group "${{ vars.RUNNER_RESOURCE_GROUP_NAME }}" \
              --action-group-name "$ALERTS_AG" \
              --alert-type budget
            exit 1
          fi
          echo "Estimated monthly cost: USD=${{ steps.budget.outputs.usd_estimate }} ZAR=${{ steps.budget.outputs.zar_estimate }}"

      - name: Scale up VMSS
        run: |
          az vmss scale \
            -g ${{ vars.RUNNER_RESOURCE_GROUP_NAME }} \
            -n "$VMSS_NAME" \
            --new-capacity ${{ github.event.inputs.capacity }}
          echo "Scaled VMSS to ${{ github.event.inputs.capacity }} instances"

      - name: Send scale-up alert
        run: |
          az monitor action-group test-notifications create \
            --resource-group "${{ vars.RUNNER_RESOURCE_GROUP_NAME }}" \
            --action-group-name "$ALERTS_AG" \
            --alert-type activitylog

  auto-scale:
    name: Auto-scale VMSS (queued jobs + CPU)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      VMSS_NAME: ${{ vars.RUNNER_VMSS_NAME || 'prod-runner-phoenixvc-vmss' }}
      AUTOSCALE_SETTING: ${{ vars.RUNNER_AUTOSCALE_SETTING_NAME || 'prod-runner-vmss-autoscale' }}
      ALERTS_AG: ${{ vars.RUNNER_ALERTS_ACTION_GROUP || 'prod-runner-alerts' }}

    steps:
      - name: Checkout (for runners.d configs)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          sparse-checkout: runners.d

      - name: Check for queued jobs across repos
        id: queued
        env:
          GH_TOKEN: ${{ secrets.RUNNER_GITHUB_PAT }}
        run: |
          QUEUED=0

          if [ -z "$GH_TOKEN" ]; then
            echo "RUNNER_GITHUB_PAT not set — skipping job queue check (CPU-only scaling)"
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "skip_queue_check=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check phoenixvc org for queued runs
          ORG_QUEUED=$(gh api "/orgs/phoenixvc/actions/runs?status=queued&per_page=100" \
            --jq '.total_count' 2>/dev/null || echo "0")
          echo "phoenixvc org queued runs: $ORG_QUEUED"
          QUEUED=$((QUEUED + ORG_QUEUED))

          # Check each repo in runners.d/*.conf for queued runs
          for conf in runners.d/*.conf; do
            [ -f "$conf" ] || continue
            REPO_URL=$(grep -oP 'GITHUB_REPO_URL=\K.*' "$conf" 2>/dev/null || true)
            [ -z "$REPO_URL" ] && continue
            # Extract owner/repo from URL
            REPO=$(echo "$REPO_URL" | sed 's|https://github.com/||')
            REPO_QUEUED=$(gh api "/repos/$REPO/actions/runs?status=queued&per_page=100" \
              --jq '.total_count' 2>/dev/null || echo "0")
            echo "$REPO queued runs: $REPO_QUEUED"
            QUEUED=$((QUEUED + REPO_QUEUED))
          done

          echo "Total queued: $QUEUED"
          echo "count=$QUEUED" >> "$GITHUB_OUTPUT"
          echo "skip_queue_check=false" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Get autoscale maximum
        id: cap
        uses: ./.github/actions/vmss-cap
        with:
          resource_group_name: ${{ vars.RUNNER_RESOURCE_GROUP_NAME }}
          autoscale_setting_name: ${{ env.AUTOSCALE_SETTING }}

      - name: Determine scale action
        id: action
        env:
          QUEUED: ${{ steps.queued.outputs.count }}
          SKIP_QUEUE: ${{ steps.queued.outputs.skip_queue_check }}
        run: |
          RG="${{ vars.RUNNER_RESOURCE_GROUP_NAME }}"
          MAX="${{ steps.cap.outputs.max }}"

          CURRENT=$(az vmss show -g "$RG" -n "$VMSS_NAME" --query "sku.capacity" -o tsv)
          echo "Current capacity: $CURRENT"
          echo "Queued jobs: $QUEUED (skip_queue_check=$SKIP_QUEUE)"

          # --- Scale UP if jobs are queued and capacity is insufficient ---
          # Only trust QUEUED when the queue check actually ran
          if [ "$SKIP_QUEUE" != "true" ] && [ "$QUEUED" -gt 0 ] && [ "$CURRENT" -lt "$QUEUED" ]; then
            TARGET=$QUEUED
            [ -n "$MAX" ] && [ "$TARGET" -gt "$MAX" ] && TARGET="$MAX"
            echo "TARGET=$TARGET" >> "$GITHUB_ENV"
            echo "Queued jobs ($QUEUED) > current capacity ($CURRENT) — target $TARGET"
            exit 0
          fi

          # --- Scale DOWN logic (no budget check needed) ---
          if [ "$CURRENT" -le 0 ]; then
            echo "Already at 0, nothing to do"
            exit 0
          fi

          # If queue check ran and jobs are queued, don't scale down
          if [ "$SKIP_QUEUE" != "true" ] && [ "$QUEUED" -gt 0 ]; then
            echo "Jobs still queued ($QUEUED), keeping $CURRENT instances"
            exit 0
          fi

          # Check average CPU across instances over last 10 min before deciding scale-down.
          # Empty AVG_CPU means the metrics lookup failed — skip scale-down in that case.
          AVG_CPU=$(az monitor metrics list \
            --resource "/subscriptions/${{ secrets.ARM_SUBSCRIPTION_ID }}/resourceGroups/$RG/providers/Microsoft.Compute/virtualMachineScaleSets/$VMSS_NAME" \
            --metric "Percentage CPU" \
            --interval PT10M \
            --aggregation Average \
            --query "value[0].timeseries[0].data[-1].average" \
            -o tsv 2>/dev/null || echo "")

          if [ -z "$AVG_CPU" ]; then
            echo "Unable to retrieve CPU metrics — skipping scale-down"
            exit 0
          fi

          echo "Average CPU: ${AVG_CPU}%"

          # If CPU < 20%, scale down by 1 (min 1 — never remove the last runner from a single sample).
          # Fallback to no scale-down if bc is unavailable.
          if [ "$(echo "$AVG_CPU < 20" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
            if [ "$CURRENT" -le 1 ]; then
              echo "Only 1 instance running — not scaling to 0 from CPU alone"
              exit 0
            fi
            NEW=$((CURRENT - 1))
            echo "SCALE_DOWN=$NEW" >> "$GITHUB_ENV"
            echo "Low utilization — will scale from $CURRENT to $NEW"
          else
            echo "CPU above threshold, keeping $CURRENT instances"
          fi

      - name: Execute scale-down
        if: env.SCALE_DOWN != ''
        run: |
          echo "Scaling VMSS to $SCALE_DOWN"
          az vmss scale -g "${{ vars.RUNNER_RESOURCE_GROUP_NAME }}" -n "$VMSS_NAME" --new-capacity "$SCALE_DOWN"

      - name: Budget check for target
        if: env.TARGET != ''
        id: budget
        uses: ./.github/actions/cost-guard
        with:
          capacity: ${{ env.TARGET }}
          vmss_rate_usd_b1s: ${{ vars.VMSS_RATE_USD_B1S }}
          listener_rate_usd_b2s: ${{ vars.LISTENER_RATE_USD_B2S }}
          zar_per_usd: ${{ vars.ZAR_PER_USD }}
          monthly_budget_zar: ${{ vars.MONTHLY_BUDGET_ZAR }}
          hours: 720

      - name: Enforce budget and scale to target
        if: env.TARGET != ''
        run: |
          RG="${{ vars.RUNNER_RESOURCE_GROUP_NAME }}"
          EX="${{ steps.budget.outputs.exceeded }}"
          if [ "$EX" = "1" ]; then
            echo "Budget threshold exceeded — skipping scale-up"
            az monitor action-group test-notifications create \
              --resource-group "$RG" \
              --action-group-name "$ALERTS_AG" \
              --alert-type budget
            exit 0
          fi
          echo "Estimated monthly cost at target ${{ env.TARGET }}: USD=${{ steps.budget.outputs.usd_estimate }} ZAR=${{ steps.budget.outputs.zar_estimate }}"
          az vmss scale -g "$RG" -n "$VMSS_NAME" --new-capacity "${{ env.TARGET }}"
