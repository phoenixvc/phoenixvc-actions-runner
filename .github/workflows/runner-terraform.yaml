name: Runner Terraform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes (true) or just plan (false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform runner infra
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      TF_IN_AUTOMATION: "true"
      TF_VAR_resource_group_name: ${{ vars.RUNNER_RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ vars.RUNNER_LOCATION }}
      TF_VAR_runner_subnet_id: ${{ secrets.RUNNER_SUBNET_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.RUNNER_SSH_PUBLIC_KEY }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: terraform apply -input=false tfplan
