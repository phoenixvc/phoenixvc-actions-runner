name: Runner Terraform

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply Terraform changes (true) or just plan (false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform runner infra
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_IN_AUTOMATION: "true"
      TF_VAR_resource_group_name: ${{ vars.RUNNER_RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ vars.RUNNER_LOCATION }}
      TF_VAR_runner_subnet_id: ${{ secrets.RUNNER_SUBNET_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.RUNNER_SSH_PUBLIC_KEY }}
      TF_VAR_alert_email: ${{ vars.RUNNER_ALERT_EMAIL }}
      TF_VAR_tags: ${{ vars.RUNNER_TAGS }}

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Azure login (OIDC)
        id: oidc_login
        continue-on-error: true
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Evaluate SP creds presence
        id: spflag
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -n "${AZURE_CREDENTIALS}" ]; then
            echo "has_sp=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sp=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (Service Principal fallback)
        if: ${{ steps.oidc_login.outcome == 'failure' && steps.spflag.outputs.has_sp == 'true' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Ubuntu image version if provided
        if: ${{ vars.RUNNER_UBUNTU_IMAGE_VERSION != '' }}
        run: |
          echo "TF_VAR_ubuntu_image_version=${{ vars.RUNNER_UBUNTU_IMAGE_VERSION }}" >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.14.5

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -diff

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: terraform apply -input=false tfplan
