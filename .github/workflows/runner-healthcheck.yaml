name: Runner Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  healthcheck:
    name: Check and restart runners
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (runners.d configs)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          sparse-checkout: runners.d

      - name: Get queued job count
        id: queue
        env:
          GH_TOKEN: ${{ secrets.RUNNER_GITHUB_PAT }}
        run: |
          COUNT=0
          if [ -z "$GH_TOKEN" ]; then
            COUNT=$(curl -s -H "authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=queued&per_page=100" | jq '.total_count // 0')
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ORG_QUEUED=$(gh api "/orgs/phoenixvc/actions/runs?status=queued&per_page=100" --jq '.total_count' 2>/dev/null || echo "0")
          COUNT=$((COUNT + ORG_QUEUED))
          for conf in runners.d/*.conf; do
            [ -f "$conf" ] || continue
            REPO_URL=$(grep -oP 'GITHUB_REPO_URL=\K.*' "$conf" 2>/dev/null || true)
            [ -z "$REPO_URL" ] && continue
            REPO="${REPO_URL#https://github.com/}"
            RQ=$(gh api "/repos/$REPO/actions/runs?status=queued&per_page=100" --jq '.total_count' 2>/dev/null || echo "0")
            COUNT=$((COUNT + RQ))
          done
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Check runner services on listener VM
        env:
          LISTENER_VM: ${{ vars.RUNNER_LISTENER_VM_NAME || 'prod-runner-listener' }}
        run: |
          # shellcheck disable=SC2016 — single-quoted script block runs on the remote VM
          az vm run-command invoke \
            -g ${{ vars.RUNNER_RESOURCE_GROUP_NAME }} \
            -n "$LISTENER_VM" \
            --command-id RunShellScript \
            --parameters "${{ steps.queue.outputs.count }}" \
            --scripts '
              FAILED=0
              QUEUED="$1"
              for svc in /etc/systemd/system/actions.runner.*.service; do
                [ -f "$svc" ] || continue
                NAME=$(basename "$svc")
                if ! systemctl is-active --quiet "$NAME"; then
                  echo "$NAME is down — restarting..."
                  sudo systemctl restart "$NAME"
                  sleep 3
                  if systemctl is-active --quiet "$NAME"; then
                    echo "$NAME restarted successfully"
                  else
                    echo "FAILED to restart $NAME"
                    FAILED=$((FAILED + 1))
                  fi
                else
                  LAST_JOB=$(journalctl -u "$NAME" --since "15 min ago" --no-pager | grep -c "Running job:" || echo "0")
                  if [ "$LAST_JOB" -eq 0 ] && [ "${QUEUED:-0}" -gt 0 ]; then
                    echo "$NAME has no recent activity and jobs are queued — restarting..."
                    sudo systemctl restart "$NAME"
                    sleep 3
                    if systemctl is-active --quiet "$NAME"; then
                      echo "$NAME restarted due to inactivity"
                    else
                      echo "FAILED to restart $NAME"
                      FAILED=$((FAILED + 1))
                    fi
                  else
                    echo "$NAME is running"
                  fi
                fi
              done
              echo "---"
              free -h
              exit $FAILED
            '
