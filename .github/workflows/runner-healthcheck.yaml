name: Runner Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  healthcheck:
    name: Check and restart runners
    runs-on: ubuntu-latest

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Check runner services on listener VM
        run: |
          az vm run-command invoke \
            -g ${{ vars.RUNNER_RESOURCE_GROUP_NAME }} \
            -n prod-runner-listener \
            --command-id RunShellScript \
            --scripts '
              FAILED=0
              for svc in /etc/systemd/system/actions.runner.*.service; do
                [ -f "$svc" ] || continue
                NAME=$(basename "$svc")
                if ! systemctl is-active --quiet "$NAME"; then
                  echo "$NAME is down — restarting..."
                  sudo systemctl restart "$NAME"
                  sleep 3
                  if systemctl is-active --quiet "$NAME"; then
                    echo "$NAME restarted successfully"
                  else
                    echo "FAILED to restart $NAME"
                    FAILED=$((FAILED + 1))
                  fi
                else
                  echo "$NAME is running"
                fi
              done
              echo "---"
              free -h
              exit $FAILED
            '
